version: '3.8'
services:
  flask_app:
    container_name: sasim-app
    restart: always
    build: ./flask_app
    ports:
      - 5000:5000
    command: gunicorn -w 1 -b 0.0.0.0:5000 wsgi:server
    volumes:
      - ./flask_app:/usr/src/app/
      - ./db:/usr/src/app/db
      - ./tracking:/usr/src/app/tracking
    env_file:
      - ./.env
    depends_on:
      - otp
    networks:
      - otp_network

  otp:
    container_name: sasim-otp
    image: docker.io/opentripplanner/opentripplanner:2.2.0
    command: --load --serve
    environment:
      - JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS:--Xmx8g}
    volumes:
      - ./otp:/var/opentripplanner
    ports:
      - 8080:8080
    networks:
      - otp_network

networks:
  otp_network:
    driver: bridge
