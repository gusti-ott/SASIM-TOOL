name: Build and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-flask:
    name: Check Flask Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flask_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile app.py

  build-flutter:
    name: Build Flutter Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flutter_frontend/multimodal_routeplanner
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'

      - name: Build Flutter Web
        run: |
          flutter gen-l10n
          flutter build web \
            --dart-define=APP_BASE_URL=${{ secrets.APP_BASE_URL }} \
            --dart-define=APP_BACKEND_PATH=${{ secrets.APP_BACKEND_PATH }}

  deploy:
    name: Commit build to main
    needs: [check-flask, build-flutter]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter_frontend/multimodal_routeplanner
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'

      - name: Build Flutter Web
        run: |
          flutter gen-l10n
          flutter build web \
            --dart-define=APP_BASE_URL=${{ secrets.APP_BASE_URL }} \
            --dart-define=APP_BACKEND_PATH=${{ secrets.APP_BACKEND_PATH }}

      - name: Commit build output
        working-directory: .
        run: |
          sed -i 's|<base href="/">|<base href="/web/">|' flutter_frontend/multimodal_routeplanner/build/web/index.html
          rm -rf flask_app/templates/*
          mkdir -p flask_app/templates
          cp -r flutter_frontend/multimodal_routeplanner/build/web/. flask_app/templates/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f flask_app/templates/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update flutter web build [skip ci]"
            git push
          fi
